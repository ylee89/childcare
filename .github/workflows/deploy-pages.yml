name: Deploy Feel Friends app to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Auto-enables Pages (source = GitHub Actions) if it isn't already.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Publish only the static app/ folder.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
